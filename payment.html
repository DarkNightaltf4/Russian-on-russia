<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата курса | человеческий русский</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            background: white;
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="payment-container">
            <div style="font-size: 60px; margin-bottom: 20px;">📦</div>
            <h1 style="margin-bottom: 20px;">Почти готово!</h1>
            <p style="color: var(--text-light); margin-bottom: 40px;">Вы выбрали курс <b>"Полное погружение"</b>. После оплаты вы получите доступ ко всем урокам, тестам и видео-разборам.</p>
            
            <div style="background: var(--bg-color); padding: 30px; border-radius: 20px; text-align: left; margin-bottom: 40px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span>Курс "Полное погружение"</span>
                    <b>1 290 ₽</b>
                </div>
                <div style="display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid #D3CCC1;">
                    <b>Итого</b>
                    <b style="color: var(--accent-peach); font-size: 24px;">1 290 ₽</b>
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%; height: 60px; font-size: 18px;">Оплатить картой</button>
            <p style="margin-top: 20px; font-size: 14px; color: var(--text-light);">Безопасная оплата через Tinkoff / CloudPayments</p>
            
            <a href="index.html" style="display: block; margin-top: 30px; color: var(--accent-green); font-weight: 700;">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
