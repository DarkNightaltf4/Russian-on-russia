<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта раздела | Русский по-русски</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="modules-data.js"></script>
    <style>
        .subtree-page {
            min-height: 100vh;
            background: linear-gradient(180deg, #FAF8F5 0%, #E9F1E6 100%);
            padding-top: 40px;
            overflow: hidden;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-light);
            font-weight: 700;
            margin-bottom: 20px;
            z-index: 100;
            position: relative;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 100;
        }

        .bamboo-container {
            position: relative;
            width: 100%;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 120px;
            margin-top: 40px;
            z-index: 1;
        }

        .bamboo-stalk {
            position: relative;
            width: 16px;
            height: 480px;
            background: #76976A;
            border-radius: 4px;
            display: flex;
            flex-direction: column-reverse;
            transform: scaleY(0) translateZ(0);
            transform-origin: bottom;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        .bamboo-active .bamboo-stalk {
            transform: scaleY(1) translateZ(0) !important;
        }

        .bamboo-node {
            height: 60px;
            width: 100%;
            border-bottom: 3px solid #5C7A52;
            position: relative;
        }

        /* --- LEAVES (Flat structure like index.html) --- */
        .leaf.bamboo-item {
            position: absolute;
            background: #8DB47E;
            border-radius: 100px 10px 100px 10px;
            width: 75px;
            height: 28px;
            display: flex !important;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            z-index: 20;
            transform: scale(0);
            visibility: visible !important;
            cursor: pointer;
            text-decoration: none;
        }

        .bamboo-active .leaf.bamboo-item {
            transform: scale(1) !important;
        }

        /* Leaf Styles for directions */
        .leaf.bamboo-item.right { transform: rotate(-15deg) scale(0); }
        .leaf.bamboo-item.left { transform: rotate(195deg) scale(0); }

        .bamboo-active .leaf.bamboo-item.right { transform: rotate(-15deg) scale(1) !important; }
        .bamboo-active .leaf.bamboo-item.left { transform: rotate(195deg) scale(1) !important; }

        .leaf.bamboo-item i {
            display: block;
            color: white;
            font-weight: 800;
            font-style: normal;
            font-size: 14px;
        }

        .leaf.bamboo-item.right i { transform: rotate(15deg); }
        .leaf.bamboo-item.left i { transform: rotate(-195deg); }

        .leaf.bamboo-item.locked {
            background: #C4D3BE !important;
            cursor: not-allowed;
        }

        /* Hardcoded Positions (The "Oak" method) */
        /* Stalk 1 (Left) */
        .leaf-pos-1 { bottom: 100px; left: calc(50% - 170px); transition-delay: 1.5s; }
        .leaf-pos-4 { bottom: 220px; left: calc(50% - 170px); transition-delay: 1.8s; }
        .leaf-pos-7 { bottom: 340px; left: calc(50% - 170px); transition-delay: 2.1s; }
        .leaf-pos-10 { bottom: 460px; left: calc(50% - 170px); transition-delay: 2.4s; }

        /* Stalk 2 (Center) */
        .leaf-pos-2 { bottom: 150px; left: calc(50% - 30px); transition-delay: 1.6s; }
        .leaf-pos-5 { bottom: 270px; left: calc(50% - 30px); transition-delay: 1.9s; }
        .leaf-pos-8 { bottom: 390px; left: calc(50% - 30px); transition-delay: 2.2s; }

        /* Stalk 3 (Right) */
        .leaf-pos-3 { bottom: 100px; left: calc(50% + 90px); transition-delay: 1.7s; }
        .leaf-pos-6 { bottom: 220px; left: calc(50% + 90px); transition-delay: 2.0s; }
        .leaf-pos-9 { bottom: 340px; left: calc(50% + 90px); transition-delay: 2.3s; }

        .leaf.bamboo-item:hover {
            background: var(--accent-peach) !important;
        }

        /* Tooltip */
        .leaf.bamboo-item .tooltip {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) rotate(0deg);
            background: white;
            color: var(--text-main);
            padding: 15px;
            border-radius: 20px;
            width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .leaf.bamboo-item:hover .tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-10px);
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #FAF8F5; display: flex; align-items: center; justify-content: center;
            z-index: 1000; font-weight: bold; color: var(--accent-green);
        }
    </style>
</head>
<body>
    <div id="loading-overlay">Загружаем карту...</div>

    <div class="subtree-page" id="main-content">
        <div class="container">
            <a href="index.html" class="back-btn">← Вернуться к дубу знаний</a>
            
            <div class="section-header">
                <span class="badge" id="category-badge">Раздел 1</span>
                <h1 id="module-title">Грамматическая основа</h1>
                <p id="module-desc" style="color: var(--text-light);"></p>
            </div>

            <div class="bamboo-container" id="bamboo-root">
                <!-- Stalks -->
                <div class="bamboo-stalk"><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div></div>
                <div class="bamboo-stalk"><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div></div>
                <div class="bamboo-stalk"><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div><div class="bamboo-node"></div></div>

                <!-- Leaves Container (Hardcoded for stability) -->
                <div id="leaves-target"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const params = new URLSearchParams(window.location.search);
                const moduleId = parseInt(params.get('id')) || 1;
                const modules = ModulesData.getModules();
                const module = modules.find(m => m.id === moduleId);

                if (!module) {
                    document.getElementById('loading-overlay').innerText = 'Ошибка: Раздел не найден';
                    return;
                }

                document.getElementById('module-title').innerText = module.title;
                document.getElementById('module-desc').innerText = module.description;

                const subModules = module.subModules || [];
                const leavesTarget = document.getElementById('leaves-target');

                subModules.forEach((sm, idx) => {
                    const leafNum = idx + 1;
                    const leaf = document.createElement(sm.locked ? 'div' : 'a');
                    if (!sm.locked) leaf.href = 'lesson.html';
                    
                    const isRight = leafNum % 2 === 0;
                    leaf.className = `leaf bamboo-item leaf-pos-${leafNum} ${isRight ? 'right' : 'left'} ${sm.locked ? 'locked' : ''}`;
                    
                    leaf.innerHTML = `
                        <i>${leafNum}</i>
                        <div class="tooltip" style="transform: translateX(-50%) rotate(${isRight ? 15 : -195}deg) rotateX(0)">
                            <b>${sm.title}</b><br>
                            ${sm.locked ? '🔒 Закрыто' : '🔓 Доступно'}
                        </div>
                    `;
                    leavesTarget.appendChild(leaf);
                });

                // Trigger animation
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('main-content').classList.add('bamboo-active');
                }, 500);

            } catch (e) {
                console.error(e);
                document.getElementById('loading-overlay').innerText = 'Ошибка загрузки данных';
            }
        });
    </script>
</body>
</html>
