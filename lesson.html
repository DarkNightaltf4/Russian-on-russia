<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесплатный урок | Грамматическая основа</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-color);
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- BACKGROUND DECORATION --- */
        .bg-blob {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--accent-green);
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: var(--accent-peach);
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, 60px) scale(1.1);
            }
        }

        .lesson-main {
            padding: 80px 0;
            min-height: 80vh;
        }

        .lesson-page-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 80px;
            border-radius: 60px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 768px) {
            .lesson-page-container {
                padding: 40px 20px;
                border-radius: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- ШАПКА -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">🌿 русский по-русски</a>
            <nav class="nav-links">
                <a href="index.html#about">Обо мне</a>
                <a href="index.html#platform">Платформа</a>
                <a href="index.html#shop">Пособия</a>
                <a href="lesson.html" style="color: var(--accent-peach);">Грамматика ✨</a>
            </nav>
            <div class="nav-actions">
                <a href="#" class="btn btn-secondary"
                    style="padding: 10px 24px; font-size: 14px; border-radius: 16px;">Войти</a>
            </div>
        </div>
    </header>

    <main class="lesson-main">
        <div class="container">
            <div class="lesson-page-container">
                <div class="lesson-header">
                    <h2 id="lesson-title">Загрузка урока...</h2>
                    <div class="lesson-step-indicator">
                        <div class="step-dot active"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                    </div>
                </div>

                <div class="lesson-content" id="lesson-content">
                    <!-- Content will be injected by lesson.js -->
                </div>
            </div>
        </div>
    </main>

    <script src="lesson.js"></script>
</body>

</html>
