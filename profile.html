<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Ученик</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        .profile-page {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .profile-header {
            background: white;
            padding: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .profile-header::after {
            content: '🌿';
            position: absolute; right: -20px; bottom: -20px;
            font-size: 120px; opacity: 0.05; transform: rotate(-15deg);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: var(--accent-green);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: 800;
        }

        .profile-info h1 { margin-bottom: 10px; }
        .profile-info p { color: var(--text-light); }

        .progress-card {
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-details h3 { margin-bottom: 10px; color: var(--text-light); font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-details h2 { margin-bottom: 5px; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-box {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-box .num { display: block; font-size: 32px; font-weight: 800; color: var(--accent-peach); margin-bottom: 5px; }
        .stat-box .label { color: var(--text-light); font-size: 14px; }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">🌿 Русский по-русски</a>
            <div class="nav-actions">
                <button onclick="Auth.logout()" class="btn-text">Выйти</button>
            </div>
        </div>
    </header>

    <main class="profile-page">
        <div class="profile-header">
            <div class="profile-avatar" id="avatar-letter">У</div>
            <div class="profile-info">
                <span class="badge" style="background: var(--accent-peach); color: white;">Ученик</span>
                <h1 id="user-name">Загрузка...</h1>
                <p>Рады видеть тебя снова! Продолжай свой путь к грамотности.</p>
            </div>
        </div>

        <div id="no-progress" style="display: none; text-align: center; padding: 60px;">
            <p style="font-size: 20px; color: var(--text-light);">Тут пока пусто. Начни заниматься, чтобы увидеть свой прогресс!</p>
            <a href="index.html#platform" class="btn btn-primary" style="margin-top: 20px;">Начать учиться</a>
        </div>

        <div id="current-progress" class="progress-card">
            <div class="progress-details">
                <h3>Твой текущий урок</h3>
                <h2 id="progress-title">...</h2>
                <p id="progress-module">Раздел 1</p>
            </div>
            <a href="#" id="continue-btn" class="btn btn-primary">Продолжить 🚀</a>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <span class="num">1</span>
                <span class="label">Разделов пройдено</span>
            </div>
            <div class="stat-box">
                <span class="num" id="steps-count">0</span>
                <span class="label">Уроков завершено</span>
            </div>
            <div class="stat-box">
                <span class="num">🔥 3</span>
                <span class="label">Дня ударно</span>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.getCurrentUser();
            if (!user || user.role !== 'student') {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('user-name').innerText = user.username;
            document.getElementById('avatar-letter').innerText = user.username[0].toUpperCase();

            const p = user.progress;
            if (p) {
                document.getElementById('progress-title').innerText = p.title || 'В процессе';
                document.getElementById('progress-module').innerText = `Раздел ${p.moduleId}`;
                document.getElementById('continue-btn').href = `lesson.html?mid=${p.moduleId}&sid=${p.subModuleIdx}`;
                document.getElementById('steps-count').innerText = p.subModuleIdx + 1;
            } else {
                document.getElementById('current-progress').style.display = 'none';
                document.getElementById('no-progress').style.display = 'block';
            }
        });
    </script>
</body>
</html>
